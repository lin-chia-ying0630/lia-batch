spring.application.name=LIA-batch
spring.main.allow-bean-definition-overriding=true
debug=false

# Excel spec file in classpath. Supports .xlsx and .xls.
lia.report.spec-file=lia-report-spec.xlsx

# Spring DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/lia_batch?serverTimezone=Asia/Taipei&characterEncoding=utf-8}
spring.datasource.username=root
spring.datasource.password=12345678

# Spring Jackson Configuration
spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.alinlin.liabatch.dto
mybatis.configuration.map-underscore-to-camel-case=true

# Logging Configuration
logging.level.org.mybatis=info
logging.level.com.alinlin.liabatch.mapper=info
logging.level.java.sql=info
logging.level.java.sql.Connection=info
logging.level.java.sql.Statement=info
logging.level.java.sql.PreparedStatement=info
